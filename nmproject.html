<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Registration & Confirmation App</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f7fc;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        background:white;
        width:450px;
        padding:25px;
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        color:#333;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:6px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    #message{
        margin-top:15px;
        text-align:center;
        font-weight:bold;
    }

    h2{
        margin-top:20px;
        color:#333;
    }

    ul{
        list-style:none;
        margin-top:10px;
    }

    li{
        background:#e9ecef;
        padding:10px;
        margin-bottom:8px;
        border-radius:6px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>Workshop Registration</h1>

    <form id="registrationForm">
        <input type="text" id="name" placeholder="Enter Participant Name" required>

        <input type="email" id="email" placeholder="Enter Email Address" required>

        <button type="submit">Register</button>
    </form>

    <p id="message"></p>

    <h2>Participant List</h2>
    <ul id="participantList"></ul>
</div>

<script>
    const form = document.getElementById("registrationForm");
    const message = document.getElementById("message");
    const participantList = document.getElementById("participantList");

    let participants = [];

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();

        // Check duplicate email
        const exists = participants.some(
            participant => participant.email.toLowerCase() === email.toLowerCase()
        );

        if (exists) {
            message.style.color = "red";
            message.textContent = "❌ Participant already registered!";
            return;
        }

        // Add participant
        participants.push({
            name: name,
            email: email
        });

        // Confirmation message
        message.style.color = "green";
        message.textContent =
            "✅ Registration Successful! Confirmation sent to " + email;

        // Update participant list
        displayParticipants();

        // Clear form
        form.reset();
    });

    function displayParticipants() {
        participantList.innerHTML = "";

        participants.forEach(participant => {
            const li = document.createElement("li");
            li.textContent = participant.name + " - " + participant.email;
            participantList.appendChild(li);
        });
    }
</script>

</body>
</html>
